services:
  bot:
    container_name: sdalgia_bot
    build:
      context: ..
      dockerfile: ./deploy/dev.Dockerfile
    env_file:
      - ../config/bot.env
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  postgres:
    container_name: sdalgia_postgres
    image: postgres:18-alpine
    env_file:
      - ../config/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  pgadmin:
    container_name: sdalgia_pgadmin
    image: dpage/pgadmin4:9.15
    env_file:
      - ../config/pgadmin.env
    ports:
      - "8000:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - net
    restart: on-failure

volumes:
  postgres_data:
  pgadmin_data:

networks:
  net:
    driver: bridge
